# ============================================================================
# HA Payment Gateway — Docker Compose
# ============================================================================
# Alternativa ao Terraform para deploy local rápido.
# Topologia: 2 apps (Active-Active), Nginx LB, PostgreSQL Primary+Replica,
#            Prometheus, Grafana, PG Exporters
#
# Uso:
#   docker compose up -d          # Subir toda a infraestrutura
#   docker compose down           # Derrubar tudo
#   docker compose logs -f app-1  # Ver logs de um container
# ============================================================================

services:
  # -------------------- POSTGRESQL PRIMARY (AZ-1) --------------------
  pg-primary:
    image: postgres:16-alpine
    container_name: pg-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gateway
    volumes:
      - ./infra/postgres/primary/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    ports:
      - "5432:5432"
    networks:
      - az-1
      - az-2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -------------------- POSTGRESQL REPLICA (AZ-2) --------------------
  pg-replica:
    image: postgres:16-alpine
    container_name: pg-replica
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/init-replica.sh"]
    volumes:
      - ./infra/postgres/replica/init-replica.sh:/init-replica.sh
    ports:
      - "5433:5432"
    networks:
      - az-2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # -------------------- APP 1 (AZ-1) --------------------
  app-1:
    build: .
    container_name: app-1
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      PORT: "3000"
      DB_HOST: pg-primary
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: gateway
      INSTANCE_NAME: app-1
      ENVIRONMENT: production
    networks:
      - az-1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health/live')\""]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -------------------- APP 2 (AZ-2) --------------------
  app-2:
    build: .
    container_name: app-2
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      PORT: "3000"
      DB_HOST: pg-primary
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: gateway
      INSTANCE_NAME: app-2
      ENVIRONMENT: production
    networks:
      - az-2
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health/live')\""]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -------------------- NGINX LOAD BALANCER --------------------
  lb-nginx:
    image: nginx:1.25-alpine
    container_name: lb-nginx
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - az-1
      - az-2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # -------------------- OBSERVABILIDADE --------------------
  pg-exporter-primary:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pg-exporter-primary
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@pg-primary:5432/gateway?sslmode=disable"
    networks:
      - az-1
    restart: unless-stopped

  pg-exporter-replica:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pg-exporter-replica
    depends_on:
      pg-replica:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@pg-replica:5432/gateway?sslmode=disable"
    networks:
      - az-2
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    depends_on:
      - app-1
      - app-2
      - pg-exporter-primary
      - pg-exporter-replica
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - az-1
      - az-2
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - az-1
      - az-2
    restart: unless-stopped

networks:
  az-1:
    name: az-1
  az-2:
    name: az-2
