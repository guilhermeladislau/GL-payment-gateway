global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'gateway-app-1'
    metrics_path: /metrics
    static_configs:
      - targets: ['app-1:3000']
        labels:
          instance: 'app-1'
          az: 'az-1'

  - job_name: 'gateway-app-2'
    metrics_path: /metrics
    static_configs:
      - targets: ['app-2:3000']
        labels:
          instance: 'app-2'
          az: 'az-2'

  - job_name: 'pg-primary'
    static_configs:
      - targets: ['pg-exporter-primary:9187']
        labels:
          role: 'primary'

  - job_name: 'pg-replica'
    static_configs:
      - targets: ['pg-exporter-replica:9187']
        labels:
          role: 'replica'
